          description: Message type identifier
        request_id:
          type: string
          format: uuid
          description: The unique identifier of the request
        sequence_id:
          type: integer
          description: |
            Starts at `0` and increments for each message the server sends
            to the client.  This includes messages of other types, like
            `TurnInfo` messages.
      required:
        - type
        - request_id
        - sequence_id
      title: ListenV2_ListenV2Connected
    ChannelsListenV2MessagesListenV2TurnInfoEvent:
      type: string
      enum:
        - Update
        - StartOfTurn
        - EagerEndOfTurn
        - TurnResumed
        - EndOfTurn
      description: >
        The type of event being reported.


        - **Update** - Additional audio has been transcribed, but the turn state hasn't changed

        - **StartOfTurn** - The user has begun speaking for the first time in the turn

        - **EagerEndOfTurn** - The system has moderate confidence that the user has finished speaking for the turn. This
        is an opportunity to begin preparing an agent reply

        - **TurnResumed** - The system detected that speech had ended and therefore sent an **EagerEndOfTurn** event,
        but speech is actually continuing for this turn

        - **EndOfTurn** - The user has finished speaking for the turn
      title: ChannelsListenV2MessagesListenV2TurnInfoEvent
    ChannelsListenV2MessagesListenV2TurnInfoWordsItems:
      type: object
      properties:
        word:
          type: string
          description: The individual punctuated, properly-cased word from the transcript
        confidence:
          type: number
          format: double
          description: Confidence that this word was transcribed correctly
      required:
        - word
        - confidence
      title: ChannelsListenV2MessagesListenV2TurnInfoWordsItems
    ListenV2_ListenV2TurnInfo:
      type: object
      properties:
        type:
          type: string
          enum:
            - TurnInfo
        request_id:
          type: string
          format: uuid
          description: The unique identifier of the request
        sequence_id:
          type: integer
          description: >
            Starts at `0` and increments for each message the server sends to the client.  This includes messages of
            other types, like `Connected` messages.
        event:
          $ref: '#/components/schemas/ChannelsListenV2MessagesListenV2TurnInfoEvent'
          description: >
            The type of event being reported.


            - **Update** - Additional audio has been transcribed, but the turn state hasn't changed

            - **StartOfTurn** - The user has begun speaking for the first time in the turn

            - **EagerEndOfTurn** - The system has moderate confidence that the user has finished speaking for the turn.
            This is an opportunity to begin preparing an agent reply

            - **TurnResumed** - The system detected that speech had ended and therefore sent an **EagerEndOfTurn**
            event, but speech is actually continuing for this turn

            - **EndOfTurn** - The user has finished speaking for the turn
        turn_index:
          type: integer
          description: The index of the current turn
        audio_window_start:
          type: number
          format: double
          description: Start time in seconds of the audio range that was transcribed
        audio_window_end:
          type: number
          format: double
          description: End time in seconds of the audio range that was transcribed
        transcript:
          type: string
          description: Text that was said over the course of the current turn
        words:
          type: array
          items:
            $ref: '#/components/schemas/ChannelsListenV2MessagesListenV2TurnInfoWordsItems'
          description: The words in the `transcript`
        end_of_turn_confidence:
          type: number
          format: double
          description: Confidence that no more speech is coming in this turn
        languages:
          type: array
          items:
            type: string
          description: |
            Detected languages sorted by descending frequency in the
            transcript. Only present when the flux-general-multi model
            detects languages in the audio.
        languages_hinted:
          type: array
          items:
            type: string
          description: |
            The language hints that were supplied for this turn. Only
            present when language hints are configured.
      required:
        - type
        - request_id
        - sequence_id
        - event
        - turn_index
        - audio_window_start
        - audio_window_end
        - transcript
        - words
        - end_of_turn_confidence
      description: Describes the current turn and latest state of the turn
      title: ListenV2_ListenV2TurnInfo
